name: Verify Google Cloud Auth

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Verify credentials
        run: |
          echo "✅ Authentication successful"
          echo "Project ID: ${{ steps.auth.outputs.project_id }}"
          echo "Credentials file exists: $(test -f '${{ steps.auth.outputs.credentials_file_path }}' && echo yes || echo no)"

      - name: Test Google Play API access
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/io.music_assistant.client")
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Google Play API access confirmed (HTTP $RESPONSE)"
          else
            echo "❌ Google Play API returned HTTP $RESPONSE"
            exit 1
          fi
