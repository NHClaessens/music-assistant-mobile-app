name: Push strings to Lokalise

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'composeApp/src/commonMain/composeResources/values/strings.xml'

jobs:
  push-strings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push to Lokalise
        uses: lokalise/lokalise-push-action@v5.3.0
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN }}
          project_id: ${{ secrets.LOKALISE_PROJECT_ID }}
          base_lang: en
          translations_path: |
            composeApp/src/commonMain/composeResources
          file_ext: |
            xml
          name_pattern: "values/strings.xml"
