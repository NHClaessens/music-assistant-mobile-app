name: Check PR (Android)

on:
  pull_request:
    # ready_for_review is added so that flipping an auto-opened draft bump PR
    # to "Ready for review" triggers this check (default types don't include it).
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches: [ main ]
    # Skip Android PR checks when a PR only touches iOS-exclusive files.
    # Shared code (composeApp, gradle, etc.) still triggers a build.
    paths-ignore:
      - 'iosApp/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Skip for version bump PRs
        if: ${{ startsWith(github.head_ref, 'chore/bump-android-v') }}
        run: echo "Version bump PR — skipping build"

      - name: Checkout code
        if: ${{ !startsWith(github.head_ref, 'chore/bump-android-v') }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        if: ${{ !startsWith(github.head_ref, 'chore/bump-android-v') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        if: ${{ !startsWith(github.head_ref, 'chore/bump-android-v') }}
        run: chmod +x ./gradlew

      - name: Build debug APK
        if: ${{ !startsWith(github.head_ref, 'chore/bump-android-v') }}
        run: ./gradlew :androidApp:assembleDebug

      - name: Run tests
        if: ${{ !startsWith(github.head_ref, 'chore/bump-android-v') }}
        run: ./gradlew :androidApp:testDebug :composeApp:testAndroidHostTest

      - name: Run lint
        if: ${{ !startsWith(github.head_ref, 'chore/bump-android-v') }}
        run: ./gradlew :androidApp:lintDebug
