name: Check PR (iOS)

# Sanity-check that iOS still compiles on PRs that could affect it. Pure
# Android-only PRs are skipped. This is NOT a release — it does no signing,
# no archive, no upload. Only goal: catch compile-time breakage early.

on:
  pull_request:
    # ready_for_review is added so that flipping an auto-opened draft bump PR
    # to "Ready for review" triggers this check (default types don't include it).
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches: [ main ]
    paths-ignore:
      - 'androidApp/**'

jobs:
  compile:
    runs-on: macos-26

    steps:
      - name: Skip for version bump PRs
        if: ${{ startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        run: echo "Version bump PR — skipping compile"

      - name: Checkout code
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        uses: actions/checkout@v6

      - name: Set up JDK 21
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # WebRTC.xcframework is gitignored (~32 MB extracted, dSYMs shipped
      # separately). Cache keyed to the patched-binary release tag so
      # version/patch bumps trigger a redownload automatically. Keep in
      # sync with ios-release.yml and IOS-BUILD-INSTRUCTIONS.md.
      - name: Cache WebRTC.xcframework
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        id: cache-webrtc
        uses: actions/cache@v4
        with:
          path: iosApp/Frameworks/WebRTC.xcframework
          key: webrtc-xcframework-m125-cow-bloat-fix.1

      - name: Download WebRTC.xcframework
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') && steps.cache-webrtc.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          curl -L --fail \
            "https://github.com/teancom/webrtc/releases/download/m125-cow-bloat-fix.1/WebRTC.xcframework.m125-cow-bloat-fix.1.zip" \
            -o /tmp/WebRTC.xcframework.zip
          mkdir -p iosApp/Frameworks
          unzip -q /tmp/WebRTC.xcframework.zip -d iosApp/Frameworks/
          rm /tmp/WebRTC.xcframework.zip
          test -d iosApp/Frameworks/WebRTC.xcframework/ios-arm64/WebRTC.framework

      - name: Grant execute permission for gradlew
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        run: chmod +x ./gradlew

      # The Xcode app scheme has no test target, so `xcodebuild build` only proves
      # the app compiles. Run the KMP iOS test executable explicitly to catch
      # commonTest/iosTest failures, including Kotlin/Native-only test-name errors.
      - name: Run iOS Kotlin/Native tests
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        run: ./gradlew :composeApp:iosSimulatorArm64Test

      # Simulator destination + signing disabled gives us a compile-only pass:
      # Kotlin framework compilation runs via the Xcode build phase script, and
      # Swift compiles against the real iOS 26 SDK. No provisioning profile or
      # distribution cert required.
      - name: Build (no signing, simulator target)
        if: ${{ !startsWith(github.head_ref, 'chore/bump-ios-build-') }}
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY='' \
            build
