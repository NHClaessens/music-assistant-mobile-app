name: Check PR

on:
  pull_request:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Run tests
        run: ./gradlew :androidApp:testDebug :composeApp:testAndroidHostTest

      - name: Run lint
        run: ./gradlew :androidApp:lintDebug

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug
